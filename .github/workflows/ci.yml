name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: python -m pip install -e "src/backend[dev]"
      - name: Test backend
        run: PYTHONPATH=src/backend python -m pytest src/backend/tests -q
      - name: Typecheck backend
        run: PYTHONPATH=src/backend python -m mypy src/backend/app
      - name: Lint backend
        run: python -m ruff check src/backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Test frontend
        run: npm test
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install design lint
        run: npm ci
      - name: Lint design system
        run: npm run design:lint
